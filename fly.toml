app = "memoryloom"

primary_region = "sin"

[build]


[env]
  MEMORYLOOM_STORAGE_MODE = "json"
  MEMORYLOOM_DATA_DIR = "/app/data"
  MEMORYLOOM_LOG_LEVEL = "info"
  MEMORYLOOM_BACKUP_ON_WRITE = "true"
  MEMORYLOOM_BACKUP_RETENTION = "10"
  MEMORYLOOM_HEALTH_PORT = "8080"

[[mounts]]
  source = "memoryloom_data"
  destination = "/app/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
