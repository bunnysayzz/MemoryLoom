[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "ui"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200

[[redirects]]
  from = "/ready"
  to = "/.netlify/functions/api/ready"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[dev]
  command = "npm start"
  port = 8080
  targetPort = 8080
