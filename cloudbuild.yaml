# Google Cloud Build configuration for Cloud Run
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/memoryloom:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/memoryloom:latest'
      - '.'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/memoryloom:$COMMIT_SHA'
  
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/memoryloom:latest'
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'memoryloom'
      - '--image'
      - 'gcr.io/$PROJECT_ID/memoryloom:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'MEMORYLOOM_STORAGE_MODE=json,MEMORYLOOM_DATA_DIR=/app/data,MEMORYLOOM_LOG_LEVEL=info,MEMORYLOOM_HEALTH_PORT=8080,MEMORYLOOM_WEB_UI=true'

images:
  - 'gcr.io/$PROJECT_ID/memoryloom:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/memoryloom:latest'

options:
  logging: CLOUD_LOGGING_ONLY
